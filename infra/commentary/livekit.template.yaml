port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: true
  enable_loopback_candidate: false

redis:
  address: localhost:6379

turn:
  enabled: true
  domain: turn.beachvolleyballmedia.com
  tls_port: 5349
  udp_port: 3478
  external_tls: true

room:
  empty_timeout: 300
  departure_timeout: 30
  max_participants: 12

logging:
  level: info
  json: true

prometheus_port: 6789

keys:
  __LIVEKIT_API_KEY__: __LIVEKIT_API_SECRET__
