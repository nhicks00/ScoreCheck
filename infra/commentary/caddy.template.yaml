logging:
  logs:
    default:
      level: INFO
storage:
  module: file_system
  root: /data
apps:
  tls:
    certificates:
      automate:
        - __RTC_HOST__
        - __TURN_HOST__
    automation:
      policies:
        - subjects:
            - __RTC_HOST__
            - __TURN_HOST__
          issuers:
            - module: acme
              ca: https://acme.zerossl.com/v2/DV90
              email: __ACME_EMAIL__
            - module: acme
              ca: https://acme-v02.api.letsencrypt.org/directory
              email: __ACME_EMAIL__
  layer4:
    servers:
      main:
        listen: [":443"]
        routes:
          - match:
              - tls:
                  sni:
                    - __TURN_HOST__
            handle:
              - handler: tls
              - handler: proxy
                upstreams:
                  - dial: ["__PUBLIC_IP__:5349"]
          - match:
              - tls:
                  sni:
                    - __RTC_HOST__
            handle:
              - handler: tls
                connection_policies:
                  - alpn: ["http/1.1"]
              - handler: proxy
                upstreams:
                  - dial: ["localhost:7880"]
