# LiveKit Egress worker config for the BVM compositor stack.
# Mounted read-only and loaded via the EGRESS_CONFIG_FILE env var (see
# docker-compose.yml). Field reference: https://github.com/livekit/egress
# (README + pkg/config/base.go, pkg/config/service.go).

# --- connection to the control plane -----------------------------------------

# api_key / api_secret are intentionally omitted from this file: the worker
# falls back to the LIVEKIT_API_KEY / LIVEKIT_API_SECRET env vars injected by
# docker-compose.yml, so the keypair only lives in .env (gitignored).

# LiveKit server websocket URL. "livekit" is the compose service name; plain
# ws:// because the hop never leaves the private compose network.
ws_url: ws://livekit:7880

# Must be the SAME redis instance livekit-server uses — it is the job dispatch
# bus that hands StartWebEgress requests to this worker.
redis:
  address: redis:6379

# Permit the non-TLS websocket connection above (egress refuses insecure
# endpoints by default).
insecure: true

# Requires the version-matched seccomp profile mounted through Compose.
enable_chrome_sandbox: true

# LiveKit defaults this flag on, which bypasses the 3 GB tmpfs configured in
# Compose. The custom value is applied after the default and removes the flag.
chrome_flags:
  disable-dev-shm-usage: false

# --- service ports (published to 127.0.0.1 by docker-compose.yml) -------------

# HTTP health check endpoint; 200 = worker alive and connected.
health_port: 9091

# Prometheus metrics (per-egress CPU, admission/capacity stats). Scrape or curl
# this during the Phase 2 soak; later feeds the /admin/production health board.
prometheus_port: 9090

# --- behavior ------------------------------------------------------------------

logging:
  # debug | info | warn | error. info shows egress lifecycle + pipeline events
  # without per-frame noise.
  level: info
  # Human-readable console logs (JSON off until a collector exists).
  json: false

# Gate 1 measured about 1.3 CPU cores and 0.7 GB cgroup RSS for one 720p30 web
# egress, but the July 13 admission run rejected a second current job after the
# first workload consumed about 2.14 cores. Production now reserves one premium
# Intel 8-vCPU host per court so a native 1080p30/60 encode has materially more
# headroom. The start script independently enforces exactly one active Egress
# per host; do not weaken that hard ceiling from this cost estimate.
cpu_cost:
  max_cpu_utilization: 0.8
  web_cpu_cost: 6.0
  max_memory: 7
  memory_cost: 2
  memory_source: cgroup
  memory_kill_grace_sec: 15
