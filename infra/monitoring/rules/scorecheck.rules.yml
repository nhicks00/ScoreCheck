groups:
  - name: scorecheck-monitoring
    interval: 5s
    rules:
      - alert: ScoreCheckAgentMissing
        expr: scorecheck_monitor_agent_fresh == 0
        for: 15s
        labels:
          severity: critical
          stage: MONITORING
          issue_code: AGENT_MISSING
          root_dependency: monitoring-agent
        annotations:
          summary: "Monitoring agent {{ $labels.agent }} is stale or unreachable."
          first_action: "Check the host, private network, and scorecheck-monitor-agent service."

      - alert: ScoreCheckServiceNotRunning
        expr: scorecheck_service_running == 0
        for: 15s
        labels:
          severity: critical
          stage: HOST
          issue_code: SERVICE_NOT_RUNNING
          root_dependency: "{{ $labels.service }}"
        annotations:
          summary: "Required service {{ $labels.service }} is not running on {{ $labels.agent }}."
          first_action: "Inspect the service health and recent lifecycle events on the affected host."

      - alert: ScoreCheckServiceUnhealthy
        expr: scorecheck_service_healthy == 0
        for: 30s
        labels:
          severity: critical
          stage: HOST
          issue_code: SERVICE_UNHEALTHY
          root_dependency: "{{ $labels.service }}"
        annotations:
          summary: "Service {{ $labels.service }} is unhealthy on {{ $labels.agent }}."
          first_action: "Inspect the service health endpoint and bounded local logs."

      - alert: ScoreCheckServiceOomKilled
        expr: scorecheck_service_oom_killed == 1
        for: 0s
        labels:
          severity: critical
          stage: HOST
          issue_code: SERVICE_OOM_KILLED
          root_dependency: "{{ $labels.service }}"
        annotations:
          summary: "Service {{ $labels.service }} was OOM killed on {{ $labels.agent }}."
          first_action: "Preserve evidence, verify memory pressure, and restore only the affected service."

      - alert: ScoreCheckHostMemoryLow
        expr: scorecheck_host_memory_available_bytes / scorecheck_host_memory_total_bytes < 0.15
        for: 5m
        labels:
          severity: warning
          stage: HOST
          issue_code: HOST_MEMORY_LOW
          root_dependency: "{{ $labels.agent }}"
        annotations:
          summary: "Available memory is below 15 percent on {{ $labels.agent }}."
          first_action: "Inspect per-service memory trends and capacity headroom."

      - alert: ScoreCheckHostDiskLow
        expr: scorecheck_host_disk_free_bytes / scorecheck_host_disk_total_bytes < 0.20
        for: 5m
        labels:
          severity: warning
          stage: HOST
          issue_code: HOST_DISK_LOW
          root_dependency: "{{ $labels.agent }}"
        annotations:
          summary: "Free disk is below 20 percent on {{ $labels.agent }}."
          first_action: "Inspect bounded logs, container storage, and retention before disk pressure becomes critical."

      - alert: ScoreCheckMediaFrameErrors
        expr: increase(scorecheck_media_path_frame_errors_total[1m]) > 0
        for: 15s
        labels:
          severity: warning
          stage: RAW_INGEST
          issue_code: MEDIA_FRAME_ERRORS
          root_dependency: mediamtx
        annotations:
          summary: "Media frame errors are increasing on court {{ $labels.court }} {{ $labels.branch }}."
          first_action: "Compare raw bitrate, publisher reconnects, and the normalization branch before assigning an upstream cause."

      - alert: ScoreCheckRequiredRawPathMissing
        expr: (((scorecheck_media_path_ready{branch="raw"} == 0) * on(court) group_left(expectation_source) scorecheck_court_expectation_context) and on(court) (scorecheck_court_media_required == 1))
        for: 15s
        labels:
          severity: critical
          stage: RAW_INGEST
          issue_code: REQUIRED_RAW_PATH_MISSING
          root_dependency: mediamtx
        annotations:
          summary: '{{ if eq $labels.expectation_source "fault_gate" }}[INTENTIONAL FAULT GATE] {{ end }}Required camera ingest is missing on court {{ $labels.court }}.'
          first_action: '{{ if eq $labels.expectation_source "fault_gate" }}Restore the isolated test feed, verify raw readiness, then disarm the monitoring fault gate.{{ else }}Check camera power, venue uplink, encoder publish status, and the MediaMTX raw path.{{ end }}'

      - alert: ScoreCheckRequiredRawBitrateLow
        expr: (scorecheck_media_path_inbound_bitrate_bps{branch="raw"} < 500000) and on(court) (scorecheck_court_media_required == 1)
        for: 30s
        labels:
          severity: warning
          stage: RAW_INGEST
          issue_code: RAW_BITRATE_LOW
          root_dependency: venue-uplink
        annotations:
          summary: "Raw ingest bitrate is below 500 kbps on court {{ $labels.court }}."
          first_action: "Compare camera encoder bitrate, venue uplink quality, packet loss, and reconnect counters."

      - alert: ScoreCheckProgramVisualFreeze
        expr: (scorecheck_program_visual_frozen_duration_seconds > 15) and on(court) (scorecheck_program_visual_black_duration_seconds == 0) and on(court) (scorecheck_court_live_match == 1)
        for: 0s
        labels:
          severity: critical
          stage: RAW_INGEST
          issue_code: FULL_BITRATE_VISUAL_FREEZE
          root_dependency: venue-camera
        annotations:
          summary: "Court {{ $labels.court }} picture is repeating while rendered frames continue."
          first_action: "Inspect the camera encoder and source capture; healthy bitrate does not prove changing video content."

      - alert: ScoreCheckProgramBlackPicture
        expr: (scorecheck_program_visual_black_duration_seconds > 20) and on(court) (scorecheck_court_live_match == 1)
        for: 0s
        labels:
          severity: critical
          stage: RAW_INGEST
          issue_code: CAMERA_CONTENT_BLACK
          root_dependency: venue-camera
        annotations:
          summary: "Court {{ $labels.court }} picture is persistently black or covered."
          first_action: "Inspect the physical camera view and lens before changing network or encoder settings."

      - alert: ScoreCheckCameraAudioTrackMissing
        expr: (scorecheck_program_camera_audio_track_present == 0) and on(court) (scorecheck_court_live_match == 1)
        for: 15s
        labels:
          severity: warning
          stage: RAW_INGEST
          issue_code: CAMERA_AUDIO_TRACK_MISSING
          root_dependency: venue-camera
        annotations:
          summary: "Camera audio track is missing on court {{ $labels.court }}."
          first_action: "Check the camera microphone and encoder audio-track configuration."

      - alert: ScoreCheckCameraAudioSilent
        expr: (scorecheck_program_camera_audio_silence_age_seconds > 60) and on(court) (scorecheck_court_live_match == 1)
        for: 15s
        labels:
          severity: warning
          stage: RAW_INGEST
          issue_code: CAMERA_AUDIO_SILENT
          root_dependency: venue-camera
        annotations:
          summary: "Camera audio is persistently silent on court {{ $labels.court }}."
          first_action: "Check the camera microphone, physical audio source, and input gain."

      - alert: ScoreCheckCameraAudioClipping
        expr: (scorecheck_program_camera_audio_clipped_sample_ratio > 0.05) and on(court) (scorecheck_court_live_match == 1)
        for: 10s
        labels:
          severity: warning
          stage: RAW_INGEST
          issue_code: CAMERA_AUDIO_CLIPPING
          root_dependency: venue-camera
        annotations:
          summary: "Camera audio is clipping heavily on court {{ $labels.court }}."
          first_action: "Reduce camera input or program camera gain and verify peak recovery."

      - alert: ScoreCheckProgramBrowserMissing
        expr: (scorecheck_program_browser_heartbeat_fresh == 0) and on(court) (scorecheck_court_broadcast_live == 1)
        for: 15s
        labels:
          severity: critical
          stage: PROGRAM_BROWSER
          issue_code: PROGRAM_BROWSER_HEARTBEAT_MISSING
          root_dependency: compositor
        annotations:
          summary: "Program browser heartbeat is missing for live court {{ $labels.court }}."
          first_action: "Check compositor egress, program-page load, monitor gateway reachability, and browser logs."

      - alert: ScoreCheckProgramFpsLow
        expr: (scorecheck_program_browser_frames_per_second < 20) and on(court) (scorecheck_court_broadcast_live == 1)
        for: 20s
        labels:
          severity: critical
          stage: PROGRAM_BROWSER
          issue_code: PROGRAM_FPS_LOW
          root_dependency: compositor
        annotations:
          summary: "Rendered program FPS is below 20 on live court {{ $labels.court }}."
          first_action: "Check source FPS first, then compositor CPU, browser frame drops, and egress encoder load."

      - record: scorecheck_program_browser_frame_drop_ratio_2m
        expr: rate(scorecheck_program_browser_frames_dropped_total[2m]) / clamp_min(rate(scorecheck_program_browser_frames_received_total[2m]), 0.001)

      - record: scorecheck_program_browser_freeze_time_ratio_2m
        expr: rate(scorecheck_program_browser_freeze_duration_seconds_total[2m])

      - alert: ScoreCheckProgramFrameDropRatioHigh
        expr: |
          (scorecheck_program_browser_frame_drop_ratio_2m > 0.005)
          and (scorecheck_program_browser_frame_drop_ratio_2m <= 0.05)
          and on(court) (increase(scorecheck_program_browser_frames_received_total[2m]) >= 900)
          and on(court) (count_over_time(scorecheck_program_browser_frames_received_total[2m]) >= 12)
          and on(court) (scorecheck_court_broadcast_live == 1)
        for: 1m
        labels:
          severity: warning
          stage: PROGRAM_BROWSER
          issue_code: PROGRAM_FRAME_DROP_RATIO_HIGH
          root_dependency: program-browser
        annotations:
          summary: "Program browser decode drops exceed 0.5% on live court {{ $labels.court }}."
          first_action: "Compare received, decoded, dropped, jitter-buffer, preview, and host-load telemetry before changing the camera or compositor."

      - alert: ScoreCheckProgramFrameDropRatioCritical
        expr: |
          (scorecheck_program_browser_frame_drop_ratio_2m > 0.05)
          and on(court) (increase(scorecheck_program_browser_frames_received_total[2m]) >= 900)
          and on(court) (count_over_time(scorecheck_program_browser_frames_received_total[2m]) >= 12)
          and on(court) (scorecheck_court_broadcast_live == 1)
        for: 30s
        labels:
          severity: critical
          stage: PROGRAM_BROWSER
          issue_code: PROGRAM_FRAME_DROP_RATIO_CRITICAL
          root_dependency: program-browser
        annotations:
          summary: "Program browser decode drops exceed 5% on live court {{ $labels.court }}."
          first_action: "Inspect the program WHEP decoder and timestamp path immediately; verify upstream preview health before changing source encoding."

      - alert: ScoreCheckProgramFreezeRatioHigh
        expr: |
          (scorecheck_program_browser_freeze_time_ratio_2m > 0.01)
          and (scorecheck_program_browser_freeze_time_ratio_2m <= 0.10)
          and on(court) (increase(scorecheck_program_browser_freezes_total[2m]) >= 2)
          and on(court) (increase(scorecheck_program_browser_frames_received_total[2m]) >= 900)
          and on(court) (count_over_time(scorecheck_program_browser_frames_received_total[2m]) >= 12)
          and on(court) (scorecheck_court_broadcast_live == 1)
        for: 1m
        labels:
          severity: warning
          stage: PROGRAM_BROWSER
          issue_code: PROGRAM_FREEZE_RATIO_HIGH
          root_dependency: program-browser
        annotations:
          summary: "Program browser spent more than 1% of the last two minutes frozen on live court {{ $labels.court }}."
          first_action: "Compare Chrome freeze, frame-drop, jitter-buffer, preview, and host-load telemetry to isolate the affected stage."

      - alert: ScoreCheckProgramFreezeRatioCritical
        expr: |
          (scorecheck_program_browser_freeze_time_ratio_2m > 0.10)
          and on(court) (increase(scorecheck_program_browser_frames_received_total[2m]) >= 900)
          and on(court) (count_over_time(scorecheck_program_browser_frames_received_total[2m]) >= 12)
          and on(court) (scorecheck_court_broadcast_live == 1)
        for: 30s
        labels:
          severity: critical
          stage: PROGRAM_BROWSER
          issue_code: PROGRAM_FREEZE_RATIO_CRITICAL
          root_dependency: program-browser
        annotations:
          summary: "Program browser spent more than 10% of the last two minutes frozen on live court {{ $labels.court }}."
          first_action: "Inspect the program WHEP decoder and timestamp path immediately; verify upstream preview health before changing source encoding."

      - alert: ScoreCheckCommentaryDisconnected
        expr: (scorecheck_program_commentary_room_connected == 0) and on(court) (scorecheck_court_commentary_required == 1)
        for: 20s
        labels:
          severity: critical
          stage: COMMENTARY
          issue_code: COMMENTARY_ROOM_DISCONNECTED
          root_dependency: livekit-commentary
        annotations:
          summary: "Required commentary room is disconnected on court {{ $labels.court }}."
          first_action: "Check LiveKit health, commentator connectivity, and the program browser subscription."

      - alert: ScoreCheckCommentaryTrackMissing
        expr: (scorecheck_program_commentary_audio_tracks == 0) and on(court) (scorecheck_court_commentary_required == 1)
        for: 15s
        labels:
          severity: critical
          stage: COMMENTARY
          issue_code: COMMENTARY_TRACK_MISSING
          root_dependency: livekit-commentary
        annotations:
          summary: "Required commentary has no audio track on court {{ $labels.court }}."
          first_action: "Confirm the commentator is connected, unmuted, and publishing an audio track."

      - alert: ScoreCheckCommentaryTrackMuted
        expr: (scorecheck_program_commentary_muted_tracks > 0) and on(court) (scorecheck_court_commentary_required == 1)
        for: 10s
        labels:
          severity: warning
          stage: COMMENTARY
          issue_code: COMMENTARY_TRACK_MUTED
          root_dependency: livekit-commentary
        annotations:
          summary: "A commentary track is muted on court {{ $labels.court }}."
          first_action: "Check the commentator mute state and published LiveKit track."

      - alert: ScoreCheckCommentaryAudioClipping
        expr: (scorecheck_program_commentary_clipped_sample_ratio > 0.05) and on(court) (scorecheck_court_commentary_required == 1)
        for: 10s
        labels:
          severity: warning
          stage: COMMENTARY
          issue_code: COMMENTARY_AUDIO_CLIPPING
          root_dependency: livekit-commentary
        annotations:
          summary: "Commentary audio is clipping on court {{ $labels.court }}."
          first_action: "Reduce microphone or browser input gain and verify peak recovery."

      - alert: ScoreCheckCommentaryAudioSilent
        expr: (scorecheck_program_commentary_silence_age_seconds > 60) and on(court) (scorecheck_court_commentary_required == 1)
        for: 10s
        labels:
          severity: warning
          stage: COMMENTARY
          issue_code: COMMENTARY_AUDIO_SILENT
          root_dependency: livekit-commentary
        annotations:
          summary: "Commentary audio is persistently silent on court {{ $labels.court }}."
          first_action: "Check the commentator microphone, browser input, and physical audio source."

      - alert: ScoreCheckCommentaryPacketLoss
        expr: (increase(scorecheck_program_commentary_packets_lost[1m]) / clamp_min(increase(scorecheck_program_commentary_packets_lost[1m]) + increase(scorecheck_program_commentary_packets_received[1m]), 1) > 0.10) and on(court) (scorecheck_court_commentary_required == 1)
        for: 10s
        labels:
          severity: warning
          stage: COMMENTARY
          issue_code: COMMENTARY_PACKET_LOSS
          root_dependency: livekit-commentary
        annotations:
          summary: "Commentary packet loss exceeds ten percent on court {{ $labels.court }}."
          first_action: "Check the commentator network path and LiveKit telemetry before changing synchronization delay."

      - alert: ScoreCheckCommentaryJitterHigh
        expr: (scorecheck_program_commentary_jitter_buffer_ms > 300) and on(court) (scorecheck_court_commentary_required == 1)
        for: 20s
        labels:
          severity: warning
          stage: COMMENTARY
          issue_code: COMMENTARY_JITTER_HIGH
          root_dependency: livekit-commentary
        annotations:
          summary: "Commentary jitter-buffer delay exceeds 300 ms on court {{ $labels.court }}."
          first_action: "Check the commentator network path and LiveKit receiver telemetry before changing synchronization delay."

      - alert: ScoreCheckCommentarySyncUnlocked
        expr: ((scorecheck_program_commentary_sync_locked == 0) or (scorecheck_program_commentary_sync_gap_ms > 250)) and on(court) (scorecheck_court_commentary_required == 1)
        for: 30s
        labels:
          severity: warning
          stage: COMMENTARY
          issue_code: COMMENTARY_SYNC_UNLOCKED
          root_dependency: livekit-commentary
        annotations:
          summary: "Commentary synchronization is not locked on court {{ $labels.court }}."
          first_action: "Check clock RTT, timing sample age, and target-to-applied delay gap."

      - alert: ScoreCheckSourceAlignmentFailed
        expr: (scorecheck_score_source_aligned == 0) and on(court) (scorecheck_court_scoring_live == 1)
        for: 10s
        labels:
          severity: critical
          stage: SCORE_SOURCE
          issue_code: SCORE_SOURCE_ALIGNMENT_FAILED
          root_dependency: scorecheck-worker
        annotations:
          summary: "Current match, canonical score, or persisted overlay state is misaligned on court {{ $labels.court }}."
          first_action: "Compare the monitor snapshot issue codes before repairing queue or score state."

      - alert: ScoreCheckScoreWorkerUnavailable
        expr: (scorecheck_score_worker_healthy == 0) and on() (sum(scorecheck_court_scoring_live) > 0)
        for: 15s
        labels:
          severity: critical
          stage: SCORE_SOURCE
          issue_code: SCORE_WORKER_UNAVAILABLE
          root_dependency: scorecheck-worker
        annotations:
          summary: "The shared score worker is unavailable while live scoring is expected."
          first_action: "Check the worker heartbeat and poller errors once; do not repair eight court queues independently."

      - alert: ScoreCheckRenderedScoreMismatch
        expr: (scorecheck_program_score_render_aligned == 0) and on(court) (scorecheck_court_broadcast_live == 1)
        for: 10s
        labels:
          severity: critical
          stage: SCORE_RENDER
          issue_code: SCOREBUG_RENDER_MISMATCH
          root_dependency: program-browser
        annotations:
          summary: "Rendered scorebug differs from source state on court {{ $labels.court }}."
          first_action: "Inspect source and DOM signatures; do not mutate canonical score data until the rendering fault is isolated."

      - alert: ScoreCheckNativeEndpointDown
        expr: scorecheck_native_endpoint_up{service!~"egress-(metrics|health)"} == 0
        for: 20s
        labels:
          severity: critical
          stage: HOST
          issue_code: NATIVE_ENDPOINT_DOWN
          root_dependency: "{{ $labels.service }}"
        annotations:
          summary: "Native endpoint {{ $labels.service }} is down on {{ $labels.agent }}."
          first_action: "Inspect the bounded service health and container state on the affected host."

      - alert: ScoreCheckEgressWorkerUnavailable
        expr: |
          (
            min by (agent) (
              scorecheck_native_endpoint_up{role="compositor",service=~"egress-(metrics|health)"}
              or scorecheck_egress_metrics_valid
            ) == 0
          )
          and on (agent)
          (
            max by (agent) (
              scorecheck_compositor_court_assignment
              * on (court) group_left scorecheck_court_broadcast_live
            ) == 1
          )
        for: 20s
        labels:
          severity: critical
          stage: EGRESS
          issue_code: EGRESS_WORKER_UNAVAILABLE
          root_dependency: "{{ $labels.agent }}"
        annotations:
          summary: "Egress worker {{ $labels.agent }} is unavailable."
          first_action: "Inspect Egress health, Redis and LiveKit control connectivity, then check host capacity."

      - alert: ScoreCheckEgressCapacityExhausted
        expr: |
          (scorecheck_egress_can_accept_request == 0)
          and on (agent)
          (
            max by (agent) (
              scorecheck_compositor_court_assignment
              * on (court) group_left scorecheck_court_broadcast_live
            ) == 1
          )
        for: 30s
        labels:
          severity: warning
          stage: EGRESS
          issue_code: EGRESS_CAPACITY_EXHAUSTED
          root_dependency: "{{ $labels.agent }}"
        annotations:
          summary: "Egress worker {{ $labels.agent }} cannot admit another court."
          first_action: "Inspect Egress CPU and memory admission load before starting another court on this host."

      - alert: ScoreCheckLiveKitPacketDrops
        expr: increase(scorecheck_livekit_packets_dropped[1m]) > 10
        for: 15s
        labels:
          severity: warning
          stage: COMMENTARY
          issue_code: LIVEKIT_PACKET_DROPS
          root_dependency: livekit-commentary
        annotations:
          summary: "LiveKit packet drops are increasing on {{ $labels.agent }}."
          first_action: "Compare participant network quality, server load, and packet output before assigning the fault."

      - alert: ScoreCheckProgramBranchProgressMissing
        expr: (scorecheck_ffmpeg_progress_fresh{branch="program"} == 0) and on(court) (scorecheck_court_broadcast_live == 1)
        for: 20s
        labels:
          severity: critical
          stage: PROGRAM_PATH
          issue_code: PROGRAM_BRANCH_PROGRESS_MISSING
          root_dependency: mediamtx-ffmpeg
        annotations:
          summary: "Program FFmpeg branch progress is missing on live court {{ $labels.court }}."
          first_action: "Check the raw and preview paths, on-demand reader, and MediaMTX branch process."

      - alert: ScoreCheckPreviewBranchFpsLow
        expr: (scorecheck_ffmpeg_frames_per_second{branch="preview"} < 20) and on(court) (scorecheck_court_broadcast_live == 1)
        for: 20s
        labels:
          severity: critical
          stage: PREVIEW
          issue_code: PREVIEW_BRANCH_FPS_LOW
          root_dependency: mediamtx-ffmpeg
        annotations:
          summary: "Preview normalization FPS is below 20 on live court {{ $labels.court }}."
          first_action: "Compare raw ingest continuity and host CPU before changing encoder settings."

      - alert: ScoreCheckYouTubeUnhealthy
        expr: (scorecheck_youtube_healthy == 0) and on(court) (scorecheck_court_broadcast_live == 1)
        for: 30s
        labels:
          severity: critical
          stage: YOUTUBE
          issue_code: YOUTUBE_STREAM_UNHEALTHY
          root_dependency: youtube
        annotations:
          summary: "YouTube reports unhealthy ingestion on court {{ $labels.court }}."
          first_action: "Inspect YouTube stream health and configuration issue codes, then compare egress output health."

      - alert: ScoreCheckYouTubeDegraded
        expr: (scorecheck_youtube_degraded == 1) and on(court) (scorecheck_court_broadcast_live == 1)
        for: 1m
        labels:
          severity: warning
          stage: YOUTUBE
          issue_code: YOUTUBE_STREAM_DEGRADED
          root_dependency: youtube
        annotations:
          summary: "YouTube reports a warning-level ingestion issue on court {{ $labels.court }}."
          first_action: "Inspect the bounded YouTube configuration issue codes and compare source and egress health."

      - alert: ScoreCheckNotificationProviderFailed
        expr: scorecheck_notification_provider_healthy == 0
        for: 30s
        labels:
          severity: critical
          stage: NOTIFICATION
          issue_code: NOTIFICATION_PROVIDER_FAILED
          root_dependency: "{{ $labels.provider }}"
        annotations:
          summary: "Notification provider {{ $labels.provider }} has failed recent delivery or receipt checks."
          first_action: "Check provider status and credentials; verify the alternate paging path and external dead-man notification."

      - alert: ScoreCheckDeadManDeliveryFailed
        expr: scorecheck_external_dead_man_healthy == 0
        for: 30s
        labels:
          severity: critical
          stage: NOTIFICATION
          issue_code: EXTERNAL_DEAD_MAN_FAILED
          root_dependency: healthchecks
        annotations:
          summary: "External dead-man {{ $labels.check }} delivery is failing."
          first_action: "Check outbound connectivity and Healthchecks status; verify the other dead-man check before changing its cadence."
