rule_files:
  - scorecheck.rules.yml

evaluation_interval: 5s

tests:
  - name: repeated picture is isolated and does not masquerade as black
    interval: 5s
    input_series:
      - series: 'scorecheck_camera_visual_frozen_duration_seconds{agent="comp-a",court="1"}'
        values: '0 5 10 16 21 26'
      - series: 'scorecheck_camera_visual_black_duration_seconds{agent="comp-a",court="1"}'
        values: '0 0 0 0 0 0'
      - series: 'scorecheck_camera_content_analyzer_available{agent="comp-a",court="1"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_court_live_match{court="1"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_camera_visual_frozen_duration_seconds{agent="comp-b",court="2"}'
        values: '0 0 0 0 0 0'
      - series: 'scorecheck_camera_visual_black_duration_seconds{agent="comp-b",court="2"}'
        values: '0 0 0 0 0 0'
      - series: 'scorecheck_camera_content_analyzer_available{agent="comp-b",court="2"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_court_live_match{court="2"}'
        values: '1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 20s
        alertname: ScoreCheckCameraVisualFreeze
        exp_alerts:
          - exp_labels:
              court: '1'
              agent: comp-a
              severity: critical
              stage: RAW_INGEST
              issue_code: FULL_BITRATE_VISUAL_FREEZE
              root_dependency: venue-camera
            exp_annotations:
              summary: Camera 1 picture is repeating while encoded frames continue.
              first_action: Inspect the camera encoder and source capture; healthy bitrate does not prove changing video content.
      - eval_time: 20s
        alertname: ScoreCheckCameraBlackPicture
        exp_alerts: []

  - name: persistent black suppresses the repeated-picture page
    interval: 5s
    input_series:
      - series: 'scorecheck_camera_visual_frozen_duration_seconds{agent="comp-a",court="1"}'
        values: '0 5 10 16 21 26'
      - series: 'scorecheck_camera_visual_black_duration_seconds{agent="comp-a",court="1"}'
        values: '0 5 10 16 21 26'
      - series: 'scorecheck_camera_content_analyzer_available{agent="comp-a",court="1"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_court_live_match{court="1"}'
        values: '1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 25s
        alertname: ScoreCheckCameraVisualFreeze
        exp_alerts: []
      - eval_time: 25s
        alertname: ScoreCheckCameraBlackPicture
        exp_alerts:
          - exp_labels:
              court: '1'
              agent: comp-a
              severity: critical
              stage: RAW_INGEST
              issue_code: CAMERA_CONTENT_BLACK
              root_dependency: venue-camera
            exp_annotations:
              summary: Camera 1 picture is persistently black or covered.
              first_action: Inspect the physical camera view and lens before changing network or encoder settings.

  - name: camera content analyzer ownership and availability fail closed
    interval: 1s
    input_series:
      - series: 'scorecheck_camera_content_analyzer_configured{agent="comp-a",court="1"}'
        values: '0+0x8'
      - series: 'scorecheck_camera_content_analyzer_configured{agent="comp-b",court="2"}'
        values: '1+0x8'
      - series: 'scorecheck_camera_content_analyzer_available{agent="comp-b",court="2"}'
        values: '0+0x8'
      - series: 'scorecheck_camera_content_analyzer_configured{agent="comp-c",court="3"}'
        values: '1+0x8'
      - series: 'scorecheck_camera_content_analyzer_configured{agent="comp-d",court="3"}'
        values: '1+0x8'
      - series: 'scorecheck_court_live_match{court="1"}'
        values: '1+0x8'
      - series: 'scorecheck_court_live_match{court="2"}'
        values: '1+0x8'
      - series: 'scorecheck_court_live_match{court="3"}'
        values: '1+0x8'
    alert_rule_test:
      - eval_time: 6s
        alertname: ScoreCheckCameraContentAnalyzerUnassigned
        exp_alerts:
          - exp_labels:
              agent: comp-a
              court: '1'
              severity: critical
              stage: RAW_INGEST
              issue_code: CAMERA_CONTENT_ANALYZER_UNAVAILABLE
              root_dependency: monitoring-agent
            exp_annotations:
              summary: Camera 1 has no host-local picture and audio analyzer.
              first_action: Check the assigned compositor analyzer configuration before trusting camera-content health.
      - eval_time: 6s
        alertname: ScoreCheckCameraContentAnalyzerUnavailable
        exp_alerts:
          - exp_labels:
              agent: comp-b
              court: '2'
              severity: critical
              stage: RAW_INGEST
              issue_code: CAMERA_CONTENT_ANALYZER_UNAVAILABLE
              root_dependency: monitoring-agent
            exp_annotations:
              summary: Camera 2 picture and audio analyzer is unavailable on comp-b.
              first_action: Check the assigned compositor agent, analyzer process, and private raw RTSP path.
      - eval_time: 6s
        alertname: ScoreCheckCameraContentAnalyzerConflict
        exp_alerts:
          - exp_labels:
              court: '3'
              severity: critical
              stage: RAW_INGEST
              issue_code: CAMERA_CONTENT_ANALYZER_CONFLICT
              root_dependency: monitoring-configuration
            exp_annotations:
              summary: Camera 3 is assigned to more than one host-local analyzer.
              first_action: Remove the duplicate analyzer assignment before trusting camera-content health.

  - name: required camera loss pages only the affected court after its hold
    interval: 5s
    input_series:
      - series: 'scorecheck_media_path_ready{court="1",branch="raw"}'
        values: '0 0 0 0 0'
      - series: 'scorecheck_court_media_required{court="1"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_expectation_context{court="1",expectation_source="control_plane"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_media_path_ready{court="2",branch="raw"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_media_required{court="2"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_expectation_context{court="2",expectation_source="control_plane"}'
        values: '1 1 1 1 1'
    alert_rule_test:
      - eval_time: 10s
        alertname: ScoreCheckRequiredRawPathMissing
        exp_alerts: []
      - eval_time: 20s
        alertname: ScoreCheckRequiredRawPathMissing
        exp_alerts:
          - exp_labels:
              court: '1'
              branch: raw
              expectation_source: control_plane
              severity: critical
              stage: RAW_INGEST
              issue_code: REQUIRED_RAW_PATH_MISSING
              root_dependency: mediamtx
            exp_annotations:
              summary: Required camera ingest is missing on court 1.
              first_action: Check camera power, venue uplink, encoder publish status, and the MediaMTX raw path.

  - name: intentional fault-gate camera loss remains clearly labeled
    interval: 5s
    input_series:
      - series: 'scorecheck_media_path_ready{court="4",branch="raw"}'
        values: '1 0 0 0 0'
      - series: 'scorecheck_court_media_required{court="4"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_expectation_context{court="4",expectation_source="fault_gate"}'
        values: '1 1 1 1 1'
    alert_rule_test:
      - eval_time: 20s
        alertname: ScoreCheckRequiredRawPathMissing
        exp_alerts:
          - exp_labels:
              court: '4'
              branch: raw
              expectation_source: fault_gate
              severity: critical
              stage: RAW_INGEST
              issue_code: REQUIRED_RAW_PATH_MISSING
              root_dependency: mediamtx
            exp_annotations:
              summary: '[INTENTIONAL FAULT GATE] Required camera ingest is missing on court 4.'
              first_action: Restore the isolated test feed, verify raw readiness, then disarm the monitoring fault gate.

  - name: camera audio failures keep exact issue codes and live-match gating
    interval: 5s
    input_series:
      - series: 'scorecheck_camera_audio_track_present{agent="comp-a",court="1"}'
        values: '0 0 0 0 0 0'
      - series: 'scorecheck_camera_content_analyzer_available{agent="comp-a",court="1"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_camera_audio_silence_age_seconds{agent="comp-b",court="2"}'
        values: '61 62 63 64 65 66'
      - series: 'scorecheck_camera_content_analyzer_available{agent="comp-b",court="2"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_camera_audio_clipped_sample_ratio{agent="comp-c",court="3"}'
        values: '0.06 0.06 0.06 0.06 0.06 0.06'
      - series: 'scorecheck_camera_content_analyzer_available{agent="comp-c",court="3"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_camera_audio_track_present{agent="comp-d",court="4"}'
        values: '0 0 0 0 0 0'
      - series: 'scorecheck_camera_content_analyzer_available{agent="comp-d",court="4"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_court_live_match{court="1"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_court_live_match{court="2"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_court_live_match{court="3"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_court_live_match{court="4"}'
        values: '0 0 0 0 0 0'
    alert_rule_test:
      - eval_time: 20s
        alertname: ScoreCheckCameraAudioTrackMissing
        exp_alerts:
          - exp_labels:
              court: '1'
              agent: comp-a
              severity: critical
              stage: RAW_INGEST
              issue_code: CAMERA_AUDIO_TRACK_MISSING
              root_dependency: venue-camera
            exp_annotations:
              summary: Camera audio track is missing on Camera 1.
              first_action: Check the camera microphone and encoder audio-track configuration.
      - eval_time: 20s
        alertname: ScoreCheckCameraAudioSilent
        exp_alerts:
          - exp_labels:
              court: '2'
              agent: comp-b
              severity: critical
              stage: RAW_INGEST
              issue_code: CAMERA_AUDIO_SILENT
              root_dependency: venue-camera
            exp_annotations:
              summary: Camera audio is persistently silent on Camera 2.
              first_action: Check the camera microphone, physical audio source, and input gain.
      - eval_time: 20s
        alertname: ScoreCheckCameraAudioClipping
        exp_alerts:
          - exp_labels:
              court: '3'
              agent: comp-c
              severity: warning
              stage: RAW_INGEST
              issue_code: CAMERA_AUDIO_CLIPPING
              root_dependency: venue-camera
            exp_annotations:
              summary: Camera audio is clipping heavily on Camera 3.
              first_action: Reduce camera input gain and verify that the audio peak recovers.

  - name: commentary track and network faults are isolated to required courts
    interval: 5s
    input_series:
      - series: 'scorecheck_program_commentary_audio_tracks{court="1"}'
        values: '0 0 0 0 0 0 0'
      - series: 'scorecheck_program_commentary_audio_tracks{court="2"}'
        values: '0 0 0 0 0 0 0'
      - series: 'scorecheck_program_commentary_jitter_buffer_ms{court="3"}'
        values: '350 350 350 350 350 350 350'
      - series: 'scorecheck_court_commentary_required{court="1"}'
        values: '1 1 1 1 1 1 1'
      - series: 'scorecheck_court_commentary_required{court="2"}'
        values: '0 0 0 0 0 0 0'
      - series: 'scorecheck_court_commentary_required{court="3"}'
        values: '1 1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 20s
        alertname: ScoreCheckCommentaryTrackMissing
        exp_alerts:
          - exp_labels:
              court: '1'
              severity: critical
              stage: COMMENTARY
              issue_code: COMMENTARY_TRACK_MISSING
              root_dependency: livekit-commentary
            exp_annotations:
              summary: Required commentary has no audio track on court 1.
              first_action: Confirm the commentator is connected, unmuted, and publishing an audio track.
      - eval_time: 30s
        alertname: ScoreCheckCommentaryJitterHigh
        exp_alerts:
          - exp_labels:
              court: '3'
              severity: warning
              stage: COMMENTARY
              issue_code: COMMENTARY_JITTER_HIGH
              root_dependency: livekit-commentary
            exp_annotations:
              summary: Commentary jitter-buffer delay exceeds 300 ms on court 3.
              first_action: Check the commentator network path and LiveKit receiver telemetry before changing synchronization delay.

  - name: shared score worker creates one dependency alert rather than eight court alerts
    interval: 5s
    input_series:
      - series: 'scorecheck_score_worker_healthy'
        values: '0 0 0 0 0'
      - series: 'scorecheck_court_scoring_live{court="1"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="2"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="3"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="4"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="5"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="6"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="7"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="8"}'
        values: '1 1 1 1 1'
    alert_rule_test:
      - eval_time: 20s
        alertname: ScoreCheckScoreWorkerUnavailable
        exp_alerts:
          - exp_labels:
              severity: critical
              stage: SCORE_SOURCE
              issue_code: SCORE_WORKER_UNAVAILABLE
              root_dependency: scorecheck-worker
            exp_annotations:
              summary: The shared score worker is unavailable while live scoring is expected.
              first_action: Check the worker heartbeat and poller errors once; do not repair eight court queues independently.

  - name: rendered score mismatch and YouTube unknown stay court-local and semantically distinct
    interval: 5s
    input_series:
      - series: 'scorecheck_program_score_render_aligned{court="3"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_program_score_render_aligned{court="4"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="3"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="4"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_youtube_healthy{court="3"}'
        values: '-1 -1 -1 -1 -1 -1 -1 -1'
    alert_rule_test:
      - eval_time: 15s
        alertname: ScoreCheckRenderedScoreMismatch
        exp_alerts:
          - exp_labels:
              court: '3'
              severity: critical
              stage: SCORE_RENDER
              issue_code: SCOREBUG_RENDER_MISMATCH
              root_dependency: program-browser
            exp_annotations:
              summary: Rendered scorebug differs from source state on court 3.
              first_action: Inspect source and DOM signatures; do not mutate canonical score data until the rendering fault is isolated.
      - eval_time: 35s
        alertname: ScoreCheckYouTubeUnhealthy
        exp_alerts: []

  - name: Egress busy state is healthy and true faults are scoped to assigned live courts
    interval: 5s
    input_series:
      - series: 'scorecheck_egress_idle{agent="compositor-a"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_egress_metrics_valid{agent="compositor-a"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-a"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_egress_active_web_requests{agent="compositor-a"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_maximum_web_requests{agent="compositor-a"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-a",role="compositor",service="egress-metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-a",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-a",court="1"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="1"}'
        values: '1 1 1 1 1 1 1 1'

      - series: 'scorecheck_egress_metrics_valid{agent="compositor-b"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-b"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-b",role="compositor",service="egress-metrics"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-b",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-b",court="2"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="2"}'
        values: '0 0 0 0 0 0 0 0'

      - series: 'scorecheck_egress_metrics_valid{agent="compositor-c"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-c"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-c",role="compositor",service="egress-metrics"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-c",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-c",court="3"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="3"}'
        values: '1 1 1 1 1 1 1 1'

      - series: 'scorecheck_egress_metrics_valid{agent="compositor-d"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-d"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-d",role="compositor",service="egress-metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-d",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-d",court="4"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="4"}'
        values: '1 1 1 1 1 1 1 1'

      - series: 'scorecheck_egress_metrics_valid{agent="compositor-e"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-e"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_egress_active_web_requests{agent="compositor-e"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_egress_maximum_web_requests{agent="compositor-e"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-e",role="compositor",service="egress-metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-e",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-e",court="5"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="5"}'
        values: '1 1 1 1 1 1 1 1'

      - series: 'scorecheck_egress_metrics_valid{agent="compositor-f"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-f"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_egress_active_web_requests{agent="compositor-f"}'
        values: '2 2 2 2 2 2 2 2'
      - series: 'scorecheck_egress_maximum_web_requests{agent="compositor-f"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-f",role="compositor",service="egress-metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-f",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'

      - series: 'scorecheck_egress_metrics_valid{agent="compositor-g"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-g"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_active_web_requests{agent="compositor-g"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_egress_maximum_web_requests{agent="compositor-g"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-g",role="compositor",service="egress-metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-g",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-g",court="7"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="7"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_program_browser_heartbeat_fresh{court="7"}'
        values: '0 0 0 0 0 0 0 0'

      - series: 'scorecheck_egress_metrics_valid{agent="compositor-h"}'
        values: '0 0 1 1 1 1 1 1'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-h"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_egress_active_web_requests{agent="compositor-h"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_maximum_web_requests{agent="compositor-h"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-h",role="compositor",service="egress-metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-h",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-h",court="6"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-h",court="8"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="6"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="8"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_program_browser_heartbeat_fresh{court="6"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_program_browser_heartbeat_fresh{court="8"}'
        values: '1 1 1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 35s
        alertname: ScoreCheckEgressWorkerUnavailable
        exp_alerts:
          - exp_labels:
              agent: compositor-c
              severity: critical
              stage: EGRESS
              issue_code: EGRESS_WORKER_UNAVAILABLE
              root_dependency: compositor-c
            exp_annotations:
              summary: Egress worker compositor-c is unavailable.
              first_action: Inspect Egress health, Redis and LiveKit control connectivity, then check host capacity.
          - exp_labels:
              agent: compositor-d
              severity: critical
              stage: EGRESS
              issue_code: EGRESS_WORKER_UNAVAILABLE
              root_dependency: compositor-d
            exp_annotations:
              summary: Egress worker compositor-d is unavailable.
              first_action: Inspect Egress health, Redis and LiveKit control connectivity, then check host capacity.
      - eval_time: 35s
        alertname: ScoreCheckEgressAdmissionBlocked
        exp_alerts:
          - exp_labels:
              agent: compositor-e
              severity: warning
              stage: EGRESS
              issue_code: EGRESS_ADMISSION_BLOCKED
              root_dependency: compositor-e
            exp_annotations:
              summary: Idle Egress worker compositor-e cannot admit a court.
              first_action: Inspect Egress availability and resource admission before starting coverage.
      - eval_time: 10s
        alertname: ScoreCheckEgressRequestMultiplicity
        exp_alerts:
          - exp_labels:
              agent: compositor-f
              severity: critical
              stage: EGRESS
              issue_code: EGRESS_REQUEST_MULTIPLICITY
              root_dependency: compositor-f
            exp_annotations:
              summary: Egress worker compositor-f has more active web requests than its configured maximum.
              first_action: Stop the unintended extra Egress request and verify the compositor admission lock.
      - eval_time: 10s
        alertname: ScoreCheckEgressExpectationExceedsCapacity
        exp_alerts: []
      - eval_time: 20s
        alertname: ScoreCheckEgressExpectationExceedsCapacity
        exp_alerts:
          - exp_labels:
              agent: compositor-h
              severity: critical
              stage: EGRESS
              issue_code: EGRESS_EXPECTATION_EXCEEDS_CAPACITY
              root_dependency: compositor-h
            exp_annotations:
              summary: Egress worker compositor-h has more expected court outputs than qualified capacity.
              first_action: Move an expected court to a qualified compositor or increase only proven Egress capacity before going live.
      - eval_time: 5s
        alertname: ScoreCheckEgressOutputMissing
        exp_alerts: []
      - eval_time: 15s
        alertname: ScoreCheckEgressOutputMissing
        exp_alerts:
          - exp_labels:
              agent: compositor-g
              court: '7'
              severity: critical
              stage: EGRESS
              issue_code: EGRESS_OUTPUT_MISSING
              root_dependency: compositor-g
            exp_annotations:
              summary: Court 7 Egress output is missing on compositor-g.
              first_action: Restart this court's Egress output and confirm the program browser heartbeat returns.
      - eval_time: 35s
        alertname: ScoreCheckNativeEndpointDown
        exp_alerts: []

  - name: external dead-man delivery failure is explicit and check-scoped
    interval: 5s
    input_series:
      - series: 'scorecheck_external_dead_man_healthy{check="baseline"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_external_dead_man_healthy{check="active"}'
        values: '1 1 1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 35s
        alertname: ScoreCheckDeadManDeliveryFailed
        exp_alerts:
          - exp_labels:
              check: baseline
              severity: critical
              stage: NOTIFICATION
              issue_code: EXTERNAL_DEAD_MAN_FAILED
              root_dependency: healthchecks
            exp_annotations:
              summary: External dead-man baseline delivery is failing.
              first_action: Check outbound connectivity and Healthchecks status; verify the other dead-man check before changing its cadence.

  - name: external dead-man phone attachment and audit failures are distinct
    interval: 5s
    input_series:
      - series: 'scorecheck_external_dead_man_channel_audit_healthy'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_external_dead_man_phone_channel_ready{check="baseline"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_external_dead_man_phone_channel_ready{check="active"}'
        values: '1 1 1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 35s
        alertname: ScoreCheckDeadManChannelAuditFailed
        exp_alerts:
          - exp_labels:
              severity: critical
              stage: NOTIFICATION
              issue_code: EXTERNAL_DEAD_MAN_CHANNEL_AUDIT_FAILED
              root_dependency: healthchecks
            exp_annotations:
              summary: ScoreCheck cannot verify the external phone-alert attachment.
              first_action: Keep the monitor open and verify the Healthchecks API key and provider status.
      - eval_time: 35s
        alertname: ScoreCheckDeadManPhoneChannelMissing
        exp_alerts:
          - exp_labels:
              check: baseline
              severity: critical
              stage: NOTIFICATION
              issue_code: EXTERNAL_DEAD_MAN_PHONE_CHANNEL_MISSING
              root_dependency: healthchecks
            exp_annotations:
              summary: External phone alerts are not attached to the baseline watchdog.
              first_action: Attach the Healthchecks Pushover integration to this check and verify it on the ScoreCheck monitor.

  - name: unverified external channel telemetry does not fabricate failure
    interval: 5s
    input_series:
      - series: 'scorecheck_external_dead_man_channel_audit_healthy'
        values: '-1 -1 -1 -1 -1 -1 -1 -1'
      - series: 'scorecheck_external_dead_man_phone_channel_ready{check="baseline"}'
        values: '-1 -1 -1 -1 -1 -1 -1 -1'
    alert_rule_test:
      - eval_time: 35s
        alertname: ScoreCheckDeadManChannelAuditFailed
        exp_alerts: []
      - eval_time: 35s
        alertname: ScoreCheckDeadManPhoneChannelMissing
        exp_alerts: []

  - name: sustained browser decode loss is live-only and severity-banded
    interval: 5s
    input_series:
      - series: 'scorecheck_program_browser_frames_received_total{court="1"}'
        values: '0+150x72'
      - series: 'scorecheck_program_browser_frames_dropped_total{court="1"}'
        values: '0+2x72'
      - series: 'scorecheck_court_broadcast_live{court="1"}'
        values: '1+0x72'

      - series: 'scorecheck_program_browser_frames_received_total{court="2"}'
        values: '0+150x72'
      - series: 'scorecheck_program_browser_frames_dropped_total{court="2"}'
        values: '0+12x72'
      - series: 'scorecheck_court_broadcast_live{court="2"}'
        values: '1+0x72'

      - series: 'scorecheck_program_browser_frames_received_total{court="3"}'
        values: '0+150x72'
      - series: 'scorecheck_program_browser_frames_dropped_total{court="3"}'
        values: '0+2x72'
      - series: 'scorecheck_court_broadcast_live{court="3"}'
        values: '0+0x72'
    alert_rule_test:
      - eval_time: 4m
        alertname: ScoreCheckProgramFrameDropRatioHigh
        exp_alerts:
          - exp_labels:
              court: '1'
              severity: warning
              stage: PROGRAM_BROWSER
              issue_code: PROGRAM_FRAME_DROP_RATIO_HIGH
              root_dependency: program-browser
            exp_annotations:
              summary: Program browser decode drops exceed 0.5% on live court 1.
              first_action: Compare received, decoded, dropped, jitter-buffer, preview, and host-load telemetry before changing the camera or compositor.
      - eval_time: 4m
        alertname: ScoreCheckProgramFrameDropRatioCritical
        exp_alerts:
          - exp_labels:
              court: '2'
              severity: critical
              stage: PROGRAM_BROWSER
              issue_code: PROGRAM_FRAME_DROP_RATIO_CRITICAL
              root_dependency: program-browser
            exp_annotations:
              summary: Program browser decode drops exceed 5% on live court 2.
              first_action: Inspect the program WHEP decoder and timestamp path immediately; verify upstream preview health before changing source encoding.

  - name: sustained browser freeze time is live-only and severity-banded
    interval: 5s
    input_series:
      - series: 'scorecheck_program_browser_frames_received_total{court="4"}'
        values: '0+150x72'
      - series: 'scorecheck_program_browser_freezes_total{court="4"}'
        values: '0+1x72'
      - series: 'scorecheck_program_browser_freeze_duration_seconds_total{court="4"}'
        values: '0+0.1x72'
      - series: 'scorecheck_court_broadcast_live{court="4"}'
        values: '1+0x72'

      - series: 'scorecheck_program_browser_frames_received_total{court="5"}'
        values: '0+150x72'
      - series: 'scorecheck_program_browser_freezes_total{court="5"}'
        values: '0+1x72'
      - series: 'scorecheck_program_browser_freeze_duration_seconds_total{court="5"}'
        values: '0+1x72'
      - series: 'scorecheck_court_broadcast_live{court="5"}'
        values: '1+0x72'

      - series: 'scorecheck_program_browser_frames_received_total{court="6"}'
        values: '0+150x72'
      - series: 'scorecheck_program_browser_freezes_total{court="6"}'
        values: '0+1x72'
      - series: 'scorecheck_program_browser_freeze_duration_seconds_total{court="6"}'
        values: '0+0.1x72'
      - series: 'scorecheck_court_broadcast_live{court="6"}'
        values: '0+0x72'
    alert_rule_test:
      - eval_time: 4m
        alertname: ScoreCheckProgramFreezeRatioHigh
        exp_alerts:
          - exp_labels:
              court: '4'
              severity: warning
              stage: PROGRAM_BROWSER
              issue_code: PROGRAM_FREEZE_RATIO_HIGH
              root_dependency: program-browser
            exp_annotations:
              summary: Program browser spent more than 1% of the last two minutes frozen on live court 4.
              first_action: Compare Chrome freeze, frame-drop, jitter-buffer, preview, and host-load telemetry to isolate the affected stage.
      - eval_time: 4m
        alertname: ScoreCheckProgramFreezeRatioCritical
        exp_alerts:
          - exp_labels:
              court: '5'
              severity: critical
              stage: PROGRAM_BROWSER
              issue_code: PROGRAM_FREEZE_RATIO_CRITICAL
              root_dependency: program-browser
            exp_annotations:
              summary: Program browser spent more than 10% of the last two minutes frozen on live court 5.
              first_action: Inspect the program WHEP decoder and timestamp path immediately; verify upstream preview health before changing source encoding.

  - name: browser quality alerts wait for a meaningful sample
    interval: 5s
    input_series:
      - series: 'scorecheck_program_browser_frames_received_total{court="1"}'
        values: '0+150x10'
      - series: 'scorecheck_program_browser_frames_dropped_total{court="1"}'
        values: '0+15x10'
      - series: 'scorecheck_program_browser_freezes_total{court="1"}'
        values: '0+1x10'
      - series: 'scorecheck_program_browser_freeze_duration_seconds_total{court="1"}'
        values: '0+1x10'
      - series: 'scorecheck_court_broadcast_live{court="1"}'
        values: '1+0x10'
    alert_rule_test:
      - eval_time: 45s
        alertname: ScoreCheckProgramFrameDropRatioCritical
        exp_alerts: []
      - eval_time: 45s
        alertname: ScoreCheckProgramFreezeRatioCritical
        exp_alerts: []
