rule_files:
  - scorecheck.rules.yml

evaluation_interval: 5s

tests:
  - name: repeated picture is isolated and does not masquerade as black
    interval: 5s
    input_series:
      - series: 'scorecheck_program_visual_frozen_duration_seconds{court="1"}'
        values: '0 5 10 16 21 26'
      - series: 'scorecheck_program_visual_black_duration_seconds{court="1"}'
        values: '0 0 0 0 0 0'
      - series: 'scorecheck_court_live_match{court="1"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_program_visual_frozen_duration_seconds{court="2"}'
        values: '0 0 0 0 0 0'
      - series: 'scorecheck_program_visual_black_duration_seconds{court="2"}'
        values: '0 0 0 0 0 0'
      - series: 'scorecheck_court_live_match{court="2"}'
        values: '1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 20s
        alertname: ScoreCheckProgramVisualFreeze
        exp_alerts:
          - exp_labels:
              court: '1'
              severity: critical
              stage: RAW_INGEST
              issue_code: FULL_BITRATE_VISUAL_FREEZE
              root_dependency: venue-camera
            exp_annotations:
              summary: Court 1 picture is repeating while rendered frames continue.
              first_action: Inspect the camera encoder and source capture; healthy bitrate does not prove changing video content.
      - eval_time: 20s
        alertname: ScoreCheckProgramBlackPicture
        exp_alerts: []

  - name: persistent black suppresses the repeated-picture page
    interval: 5s
    input_series:
      - series: 'scorecheck_program_visual_frozen_duration_seconds{court="1"}'
        values: '0 5 10 16 21 26'
      - series: 'scorecheck_program_visual_black_duration_seconds{court="1"}'
        values: '0 5 10 16 21 26'
      - series: 'scorecheck_court_live_match{court="1"}'
        values: '1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 25s
        alertname: ScoreCheckProgramVisualFreeze
        exp_alerts: []
      - eval_time: 25s
        alertname: ScoreCheckProgramBlackPicture
        exp_alerts:
          - exp_labels:
              court: '1'
              severity: critical
              stage: RAW_INGEST
              issue_code: CAMERA_CONTENT_BLACK
              root_dependency: venue-camera
            exp_annotations:
              summary: Court 1 picture is persistently black or covered.
              first_action: Inspect the physical camera view and lens before changing network or encoder settings.

  - name: required camera loss pages only the affected court after its hold
    interval: 5s
    input_series:
      - series: 'scorecheck_media_path_ready{court="1",branch="raw"}'
        values: '0 0 0 0 0'
      - series: 'scorecheck_court_media_required{court="1"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_media_path_ready{court="2",branch="raw"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_media_required{court="2"}'
        values: '1 1 1 1 1'
    alert_rule_test:
      - eval_time: 10s
        alertname: ScoreCheckRequiredRawPathMissing
        exp_alerts: []
      - eval_time: 20s
        alertname: ScoreCheckRequiredRawPathMissing
        exp_alerts:
          - exp_labels:
              court: '1'
              branch: raw
              severity: critical
              stage: RAW_INGEST
              issue_code: REQUIRED_RAW_PATH_MISSING
              root_dependency: mediamtx
            exp_annotations:
              summary: Required camera ingest is missing on court 1.
              first_action: Check camera power, venue uplink, encoder publish status, and the MediaMTX raw path.

  - name: camera audio failures keep exact issue codes and live-match gating
    interval: 5s
    input_series:
      - series: 'scorecheck_program_camera_audio_track_present{court="1"}'
        values: '0 0 0 0 0 0'
      - series: 'scorecheck_program_camera_audio_silence_age_seconds{court="2"}'
        values: '61 62 63 64 65 66'
      - series: 'scorecheck_program_camera_audio_clipped_sample_ratio{court="3"}'
        values: '0.06 0.06 0.06 0.06 0.06 0.06'
      - series: 'scorecheck_program_camera_audio_track_present{court="4"}'
        values: '0 0 0 0 0 0'
      - series: 'scorecheck_court_live_match{court="1"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_court_live_match{court="2"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_court_live_match{court="3"}'
        values: '1 1 1 1 1 1'
      - series: 'scorecheck_court_live_match{court="4"}'
        values: '0 0 0 0 0 0'
    alert_rule_test:
      - eval_time: 20s
        alertname: ScoreCheckCameraAudioTrackMissing
        exp_alerts:
          - exp_labels:
              court: '1'
              severity: warning
              stage: RAW_INGEST
              issue_code: CAMERA_AUDIO_TRACK_MISSING
              root_dependency: venue-camera
            exp_annotations:
              summary: Camera audio track is missing on court 1.
              first_action: Check the camera microphone and encoder audio-track configuration.
      - eval_time: 20s
        alertname: ScoreCheckCameraAudioSilent
        exp_alerts:
          - exp_labels:
              court: '2'
              severity: warning
              stage: RAW_INGEST
              issue_code: CAMERA_AUDIO_SILENT
              root_dependency: venue-camera
            exp_annotations:
              summary: Camera audio is persistently silent on court 2.
              first_action: Check the camera microphone, physical audio source, and input gain.
      - eval_time: 20s
        alertname: ScoreCheckCameraAudioClipping
        exp_alerts:
          - exp_labels:
              court: '3'
              severity: warning
              stage: RAW_INGEST
              issue_code: CAMERA_AUDIO_CLIPPING
              root_dependency: venue-camera
            exp_annotations:
              summary: Camera audio is clipping heavily on court 3.
              first_action: Reduce camera input or program camera gain and verify peak recovery.

  - name: commentary track and network faults are isolated to required courts
    interval: 5s
    input_series:
      - series: 'scorecheck_program_commentary_audio_tracks{court="1"}'
        values: '0 0 0 0 0 0 0'
      - series: 'scorecheck_program_commentary_audio_tracks{court="2"}'
        values: '0 0 0 0 0 0 0'
      - series: 'scorecheck_program_commentary_jitter_buffer_ms{court="3"}'
        values: '350 350 350 350 350 350 350'
      - series: 'scorecheck_court_commentary_required{court="1"}'
        values: '1 1 1 1 1 1 1'
      - series: 'scorecheck_court_commentary_required{court="2"}'
        values: '0 0 0 0 0 0 0'
      - series: 'scorecheck_court_commentary_required{court="3"}'
        values: '1 1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 20s
        alertname: ScoreCheckCommentaryTrackMissing
        exp_alerts:
          - exp_labels:
              court: '1'
              severity: critical
              stage: COMMENTARY
              issue_code: COMMENTARY_TRACK_MISSING
              root_dependency: livekit-commentary
            exp_annotations:
              summary: Required commentary has no audio track on court 1.
              first_action: Confirm the commentator is connected, unmuted, and publishing an audio track.
      - eval_time: 30s
        alertname: ScoreCheckCommentaryJitterHigh
        exp_alerts:
          - exp_labels:
              court: '3'
              severity: warning
              stage: COMMENTARY
              issue_code: COMMENTARY_JITTER_HIGH
              root_dependency: livekit-commentary
            exp_annotations:
              summary: Commentary jitter-buffer delay exceeds 300 ms on court 3.
              first_action: Check the commentator network path and LiveKit receiver telemetry before changing synchronization delay.

  - name: shared score worker creates one dependency alert rather than eight court alerts
    interval: 5s
    input_series:
      - series: 'scorecheck_score_worker_healthy'
        values: '0 0 0 0 0'
      - series: 'scorecheck_court_scoring_live{court="1"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="2"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="3"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="4"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="5"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="6"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="7"}'
        values: '1 1 1 1 1'
      - series: 'scorecheck_court_scoring_live{court="8"}'
        values: '1 1 1 1 1'
    alert_rule_test:
      - eval_time: 20s
        alertname: ScoreCheckScoreWorkerUnavailable
        exp_alerts:
          - exp_labels:
              severity: critical
              stage: SCORE_SOURCE
              issue_code: SCORE_WORKER_UNAVAILABLE
              root_dependency: scorecheck-worker
            exp_annotations:
              summary: The shared score worker is unavailable while live scoring is expected.
              first_action: Check the worker heartbeat and poller errors once; do not repair eight court queues independently.

  - name: rendered score mismatch and YouTube unknown stay court-local and semantically distinct
    interval: 5s
    input_series:
      - series: 'scorecheck_program_score_render_aligned{court="3"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_program_score_render_aligned{court="4"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="3"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="4"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_youtube_healthy{court="3"}'
        values: '-1 -1 -1 -1 -1 -1 -1 -1'
    alert_rule_test:
      - eval_time: 15s
        alertname: ScoreCheckRenderedScoreMismatch
        exp_alerts:
          - exp_labels:
              court: '3'
              severity: critical
              stage: SCORE_RENDER
              issue_code: SCOREBUG_RENDER_MISMATCH
              root_dependency: program-browser
            exp_annotations:
              summary: Rendered scorebug differs from source state on court 3.
              first_action: Inspect source and DOM signatures; do not mutate canonical score data until the rendering fault is isolated.
      - eval_time: 35s
        alertname: ScoreCheckYouTubeUnhealthy
        exp_alerts: []

  - name: Egress busy state is healthy and true faults are scoped to assigned live courts
    interval: 5s
    input_series:
      - series: 'scorecheck_egress_idle{agent="compositor-a"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_egress_metrics_valid{agent="compositor-a"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-a"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-a",role="compositor",service="egress-metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-a",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-a",court="1"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="1"}'
        values: '1 1 1 1 1 1 1 1'

      - series: 'scorecheck_egress_metrics_valid{agent="compositor-b"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-b"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-b",role="compositor",service="egress-metrics"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-b",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-b",court="2"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="2"}'
        values: '0 0 0 0 0 0 0 0'

      - series: 'scorecheck_egress_metrics_valid{agent="compositor-c"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-c"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-c",role="compositor",service="egress-metrics"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-c",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-c",court="3"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="3"}'
        values: '1 1 1 1 1 1 1 1'

      - series: 'scorecheck_egress_metrics_valid{agent="compositor-d"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-d"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-d",role="compositor",service="egress-metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-d",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-d",court="4"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="4"}'
        values: '1 1 1 1 1 1 1 1'

      - series: 'scorecheck_egress_metrics_valid{agent="compositor-e"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_egress_can_accept_request{agent="compositor-e"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-e",role="compositor",service="egress-metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_native_endpoint_up{agent="compositor-e",role="compositor",service="egress-health"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_compositor_court_assignment{agent="compositor-e",court="5"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'scorecheck_court_broadcast_live{court="5"}'
        values: '1 1 1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 35s
        alertname: ScoreCheckEgressWorkerUnavailable
        exp_alerts:
          - exp_labels:
              agent: compositor-c
              severity: critical
              stage: EGRESS
              issue_code: EGRESS_WORKER_UNAVAILABLE
              root_dependency: compositor-c
            exp_annotations:
              summary: Egress worker compositor-c is unavailable.
              first_action: Inspect Egress health, Redis and LiveKit control connectivity, then check host capacity.
          - exp_labels:
              agent: compositor-d
              severity: critical
              stage: EGRESS
              issue_code: EGRESS_WORKER_UNAVAILABLE
              root_dependency: compositor-d
            exp_annotations:
              summary: Egress worker compositor-d is unavailable.
              first_action: Inspect Egress health, Redis and LiveKit control connectivity, then check host capacity.
      - eval_time: 35s
        alertname: ScoreCheckEgressCapacityExhausted
        exp_alerts:
          - exp_labels:
              agent: compositor-e
              severity: warning
              stage: EGRESS
              issue_code: EGRESS_CAPACITY_EXHAUSTED
              root_dependency: compositor-e
            exp_annotations:
              summary: Egress worker compositor-e cannot admit another court.
              first_action: Inspect Egress CPU and memory admission load before starting another court on this host.
      - eval_time: 35s
        alertname: ScoreCheckNativeEndpointDown
        exp_alerts: []

  - name: external dead-man delivery failure is explicit and check-scoped
    interval: 5s
    input_series:
      - series: 'scorecheck_external_dead_man_healthy{check="baseline"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'scorecheck_external_dead_man_healthy{check="active"}'
        values: '1 1 1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 35s
        alertname: ScoreCheckDeadManDeliveryFailed
        exp_alerts:
          - exp_labels:
              check: baseline
              severity: critical
              stage: NOTIFICATION
              issue_code: EXTERNAL_DEAD_MAN_FAILED
              root_dependency: healthchecks
            exp_annotations:
              summary: External dead-man baseline delivery is failing.
              first_action: Check outbound connectivity and Healthchecks status; verify the other dead-man check before changing its cadence.
