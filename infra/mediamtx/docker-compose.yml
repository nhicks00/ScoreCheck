x-logging: &default-logging
  driver: json-file
  options:
    max-size: "25m"
    max-file: "4"

services:
  caddy:
    image: caddy:2.11.4-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    container_name: bvm-mediamtx-caddy
    restart: unless-stopped
    network_mode: host
    logging: *default-logging
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      mediamtx:
        condition: service_healthy

  mediamtx:
    image: bluenviron/mediamtx:1.19.2-ffmpeg@sha256:08c837deb7bac85d509e2a4c2737308e5a34f8f084a46a0d8793cdb0579a6e5d
    container_name: mediamtx
    restart: unless-stopped
    network_mode: host
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9997/v3/config/global/get >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./fonts:/fonts:ro
      - ./scorecheck-ffmpeg-runner.sh:/usr/local/bin/scorecheck-ffmpeg-runner:ro
      - ./scorecheck-preview-runner.sh:/usr/local/bin/scorecheck-preview-runner:ro
      - /var/lib/scorecheck-monitoring/ffmpeg:/monitoring/ffmpeg

volumes:
  caddy-data:
  caddy-config:
