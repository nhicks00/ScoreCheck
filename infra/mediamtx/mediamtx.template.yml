# ScoreCheck MediaMTX ingest and branch configuration.
#
# Permanent encoder identities publish to courtN_raw. MediaMTX creates a clean,
# undelayed WebRTC preview and a clean program branch delayed at the SRT packet
# receiver. The delayed branch is stream-copy only, so it does not add a second
# H.264 encoder to the ingest node.

logLevel: info

api: yes
apiAddress: 127.0.0.1:9997
metrics: yes
metricsAddress: 127.0.0.1:9998

rtsp: yes
rtspAddress: 127.0.0.1:8554
rtspTransports: [tcp]

rtmp: yes
rtmpAddress: :1935

srt: yes
srtAddress: :8890

hls: no

# ScoreCheck does not use Media-over-QUIC. Keep the unused public listeners
# closed instead of inheriting new server defaults on upgrade.
moq: no

webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcAdditionalHosts: [__PUBLIC_IP__, __PUBLIC_HOST__]
webrtcIPsFromInterfaces: no

authInternalUsers:
  # The browser-facing preview/program outputs are intentionally public during
  # Gate 1. Raw camera paths are not readable from outside the server.
  - user: any
    permissions:
      - action: read
        path: "~^court[1-8]_(preview|program|monitor|calibration)$"
      - action: playback
        path: "~^court[1-8]_(preview|program|monitor|calibration)$"

  # Each venue encoder has a separate credential and can publish only to its
  # permanent raw court identity. This limits a copied or stale camera profile
  # to one court instead of the entire event.
  - user: __COURT_1_PUBLISH_USER__
    pass: __COURT_1_PUBLISH_PASSWORD__
    permissions:
      - action: publish
        path: court1_raw
  - user: __COURT_2_PUBLISH_USER__
    pass: __COURT_2_PUBLISH_PASSWORD__
    permissions:
      - action: publish
        path: court2_raw
  - user: __COURT_3_PUBLISH_USER__
    pass: __COURT_3_PUBLISH_PASSWORD__
    permissions:
      - action: publish
        path: court3_raw
  - user: __COURT_4_PUBLISH_USER__
    pass: __COURT_4_PUBLISH_PASSWORD__
    permissions:
      - action: publish
        path: court4_raw
  - user: __COURT_5_PUBLISH_USER__
    pass: __COURT_5_PUBLISH_PASSWORD__
    permissions:
      - action: publish
        path: court5_raw
  - user: __COURT_6_PUBLISH_USER__
    pass: __COURT_6_PUBLISH_PASSWORD__
    permissions:
      - action: publish
        path: court6_raw
  - user: __COURT_7_PUBLISH_USER__
    pass: __COURT_7_PUBLISH_PASSWORD__
    permissions:
      - action: publish
        path: court7_raw
  - user: __COURT_8_PUBLISH_USER__
    pass: __COURT_8_PUBLISH_PASSWORD__
    permissions:
      - action: publish
        path: court8_raw

  # Internal branch processes and health probes never leave loopback.
  - user: any
    ips: ['127.0.0.1', '::1']
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
      - action: metrics

pathDefaults:
  overridePublisher: true

paths:
  # A raw court can be supplied by a direct publisher or pulled from a private
  # camera listener. Exact paths make the hardware assignment explicit and let
  # the same downstream preview/program rules serve both ingest modes.
  court1_raw:
    source: __COURT_1_RAW_SOURCE__
  court2_raw:
    source: __COURT_2_RAW_SOURCE__
  court3_raw:
    source: __COURT_3_RAW_SOURCE__
  court4_raw:
    source: __COURT_4_RAW_SOURCE__
  court5_raw:
    source: __COURT_5_RAW_SOURCE__
  court6_raw:
    source: __COURT_6_RAW_SOURCE__
  court7_raw:
    source: __COURT_7_RAW_SOURCE__
  court8_raw:
    source: __COURT_8_RAW_SOURCE__

  # Low-latency normalized H.264 + Opus for commentators, scorers, and producer
  # previews. It starts only when preview or program has a reader.
  "~^court([1-8])_preview$":
    runOnDemand: >
      while ! wget -qO- "http://127.0.0.1:9997/v3/paths/get/court${G1}_raw"
      2>/dev/null | grep -q "\"ready\":true"; do sleep 2; done;
      exec /usr/local/bin/scorecheck-ffmpeg-runner "court${G1}_preview" --
      -nostdin -hide_banner -loglevel warning
      -fflags nobuffer -flags low_delay -rtsp_transport tcp
      -i "rtsp://127.0.0.1:${RTSP_PORT}/court${G1}_raw"
      -map 0:v:0 -map 0:a:0?
      -c:v libx264 -preset ultrafast -tune zerolatency -profile:v main
      -pix_fmt yuv420p -vf "fps=30,scale=-2:720" -g 30 -keyint_min 30 -sc_threshold 0
      -b:v 2500k -maxrate 2750k -bufsize 5000k
      -c:a libopus -b:a 96k -ar 48000 -ac 2 -af "aresample=async=1:first_pts=0"
      -f rtsp -rtsp_transport tcp "rtsp://127.0.0.1:${RTSP_PORT}/${MTX_PATH}"
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 20s
    runOnDemandCloseAfter: 90s

  # Dashboard-selected data-saver path. The authenticated admin API admits it
  # only outside LIVE expectations, and the dashboard opens at most one reader.
  "~^court([1-8])_monitor$":
    runOnDemand: >
      while ! wget -qO- "http://127.0.0.1:9997/v3/paths/get/court${G1}_raw"
      2>/dev/null | grep -q "\"ready\":true"; do sleep 2; done;
      exec /usr/local/bin/scorecheck-ffmpeg-runner "court${G1}_monitor" --
      -nostdin -hide_banner -loglevel warning
      -fflags nobuffer -flags low_delay -rtsp_transport tcp
      -i "rtsp://127.0.0.1:${RTSP_PORT}/court${G1}_raw"
      -map 0:v:0 -map 0:a:0?
      -c:v libx264 -preset ultrafast -tune zerolatency -profile:v main
      -pix_fmt yuv420p -vf "fps=10,scale=-2:360" -g 20 -keyint_min 20 -sc_threshold 0
      -b:v 350k -maxrate 450k -bufsize 700k
      -c:a libopus -b:a 48k -ar 48000 -ac 1 -af "aresample=async=1:first_pts=0"
      -f rtsp -rtsp_transport tcp "rtsp://127.0.0.1:${RTSP_PORT}/${MTX_PATH}"
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 20s
    runOnDemandCloseAfter: 15s

  # Program-only path. SRT receiver latency deliberately holds both video and
  # ambient audio for the configured coarse delay, then stream-copies the
  # normalized codecs into a distinct WHEP path. Opening the preview input is
  # what triggers its on-demand normalizer; polling for preview readiness here
  # would deadlock when no separate preview reader is connected. Commentary
  # gets fine delay in the program page's Web Audio graph.
  "~^court([1-8])_program$":
    runOnDemand: >
      exec /usr/local/bin/scorecheck-ffmpeg-runner "court${G1}_program" --
      -nostdin -hide_banner -loglevel warning
      -i "srt://127.0.0.1:8890?streamid=read:court${G1}_preview&latency=__PROGRAM_DELAY_US__"
      -map 0:v:0 -map 0:a:0? -c copy
      -f rtsp -rtsp_transport tcp "rtsp://127.0.0.1:${RTSP_PORT}/${MTX_PATH}"
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 25s
    runOnDemandCloseAfter: 90s

  # Gate calibration only. This path adds UTC timecode without contaminating
  # either the commentator preview or the clean program feed. Its RTSP read
  # directly triggers the on-demand preview normalizer.
  "~^court([1-8])_calibration$":
    runOnDemand: >
      exec /usr/local/bin/scorecheck-ffmpeg-runner "court${G1}_calibration" --
      -nostdin -hide_banner -loglevel warning
      -fflags nobuffer -flags low_delay -rtsp_transport tcp
      -i "rtsp://127.0.0.1:${RTSP_PORT}/court${G1}_preview"
      -map 0:v:0 -map 0:a:0?
      -c:v libx264 -preset ultrafast -tune zerolatency -profile:v main
      -pix_fmt yuv420p
      -vf "drawtext=fontfile=/fonts/DejaVuSansMono-Bold.ttf:text='%{gmtime\:%Y-%m-%d %H\\\:%M\\\:%S} UTC':fontsize=24:fontcolor=white:box=1:boxcolor=black@0.65:boxborderw=8:x=w-tw-16:y=h-th-16"
      -g 60 -keyint_min 60 -sc_threshold 0
      -b:v 2500k -maxrate 2750k -bufsize 5000k
      -c:a copy
      -f rtsp -rtsp_transport tcp "rtsp://127.0.0.1:${RTSP_PORT}/${MTX_PATH}"
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 20s
    runOnDemandCloseAfter: 30s

  all_others:
