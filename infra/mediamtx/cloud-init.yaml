#cloud-config

package_update: true
package_upgrade: false
ssh_pwauth: false

packages:
  - ca-certificates
  - curl
  - jq
  - rsync
  - ufw
  - wireguard-tools

write_files:
  - path: /etc/ssh/sshd_config.d/99-scorecheck.conf
    permissions: "0644"
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin prohibit-password
      X11Forwarding no

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - >-
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc]
    https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable"
    > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  - install -d -m 0750 /opt/mediamtx /var/lib/scorecheck-monitoring/ffmpeg
  - systemctl reload ssh
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 1935/tcp
  - ufw allow 8189/udp
  - ufw allow 8890/udp
  - ufw allow 51820/udp
  - ufw allow from 10.120.0.0/20 to any port 8554 proto tcp
  - ufw allow from 10.120.0.0/20 to any port 9108 proto tcp
  - ufw --force enable

final_message: "ScoreCheck MediaMTX host bootstrap complete."
