#cloud-config

package_update: true
packages:
  - curl
  - python3
  - ufw

ssh_deletekeys: true
ssh_genkeytypes:
  - ed25519
  - rsa

write_files:
  - path: /usr/local/bin/scorecheck-lifecycle-canary
    permissions: "0755"
    content: |
      #!/usr/bin/env python3
      import json
      import socket
      import urllib.request
      from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

      def metadata(path):
          try:
              with urllib.request.urlopen("http://169.254.169.254/metadata/v1/" + path, timeout=1) as response:
                  return response.read().decode("utf-8").strip()
          except Exception:
              return "unavailable"

      class Handler(BaseHTTPRequestHandler):
          def do_GET(self):
              if self.path not in ("/", "/health", "/health.json"):
                  self.send_error(404)
                  return
              payload = json.dumps({
                  "status": "ok",
                  "service": "scorecheck-lifecycle-canary",
                  "instanceId": metadata("id"),
                  "region": metadata("region"),
                  "hostname": socket.gethostname()
              }).encode("utf-8")
              self.send_response(200)
              self.send_header("Content-Type", "application/json")
              self.send_header("Content-Length", str(len(payload)))
              self.end_headers()
              self.wfile.write(payload)

          def log_message(self, _format, *_args):
              return

      ThreadingHTTPServer(("0.0.0.0", 80), Handler).serve_forever()

  - path: /etc/systemd/system/scorecheck-lifecycle-canary.service
    permissions: "0644"
    content: |
      [Unit]
      Description=ScoreCheck disposable lifecycle canary
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/scorecheck-lifecycle-canary
      Restart=always
      RestartSec=2
      NoNewPrivileges=true
      ProtectSystem=strict
      ProtectHome=true
      PrivateTmp=true

      [Install]
      WantedBy=multi-user.target

runcmd:
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw --force enable
  - systemctl daemon-reload
  - systemctl enable --now scorecheck-lifecycle-canary.service

final_message: "ScoreCheck disposable lifecycle canary ready."
